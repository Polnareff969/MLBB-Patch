<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronology - MLBB Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090D16">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #060911; }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-16 selection:bg-white/10">

    <div class="max-w-2xl mx-auto px-4 pt-12">
        <header class="mb-10 text-center">
            <h1 class="text-2xl font-semibold tracking-tight text-white mb-1">Patch History Engine</h1>
            <p class="text-[10px] tracking-widest text-slate-500 uppercase font-medium">Automated Database Integration</p>
        </header>

        <!-- Glassmorphism Filter Module Card -->
        <div class="bg-white/[0.02] backdrop-blur-xl border border-white/[0.06] rounded-xl p-4 shadow-2xl mb-8">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="Search hero chronological changes..." 
                       class="flex-1 bg-black/40 border border-white/[0.05] rounded-lg px-4 py-2.5 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-white/20 transition-all">
                
                <div class="flex bg-black/40 p-1 border border-white/[0.05] rounded-lg self-start sm:self-auto">
                    <button id="btnAll" onclick="updateServerFilter('All')" class="px-3 py-1.5 text-[11px] font-medium rounded-md transition-all bg-white/[0.08] text-white">All</button>
                    <button id="btnOrg" onclick="updateServerFilter('Original Server')" class="px-3 py-1.5 text-[11px] font-medium rounded-md transition-all text-slate-500 hover:text-slate-300">Original</button>
                    <button id="btnAdv" onclick="updateServerFilter('Advanced Server')" class="px-3 py-1.5 text-[11px] font-medium rounded-md transition-all text-slate-500 hover:text-slate-300">Advanced</button>
                </div>
            </div>
        </div>

        <div id="statusIndicator" class="text-center py-16 text-xs text-slate-500 tracking-wide">Syncing architecture pipelines...</div>
        <div id="timelineOutput" class="space-y-4 hidden"></div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
</html>
